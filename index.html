<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AR Ops">
<title>Andes Reserve — Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--leaf:#193330;--cream:#FBEBDF;--mint:#E1EAE5;--warn-bg:#FFF3E0;--warn-t:#8B4A00;--warn-b:rgba(139,74,0,0.25);--danger-bg:#FFF0F0;--danger-t:#8B1A1A;--danger-b:rgba(139,26,26,0.2);--ok-bg:#E8F5EE;--ok-t:#1a5c35;--bdr:rgba(25,51,48,0.1);--bdr2:rgba(25,51,48,0.15);--muted:rgba(25,51,48,0.45);--dim:rgba(25,51,48,0.6);--r:10px;--rl:14px}
html,body{height:100%;overflow:hidden;background:var(--cream)}
body{font-family:'Figtree',sans-serif;color:var(--leaf);display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.hdr{background:var(--leaf);padding:12px 16px 10px;flex-shrink:0;display:flex;align-items:center;gap:10px}
.hdr svg{width:28px;height:28px;flex-shrink:0}
.hbrand{font-size:13px;font-weight:800;color:var(--cream);letter-spacing:.08em}
.hsub{font-size:9px;color:rgba(251,235,223,0.5);letter-spacing:.15em;margin-top:1px}
.hright{margin-left:auto;text-align:right}
.hdate{font-size:11px;color:rgba(251,235,223,0.5)}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(251,235,223,0.3);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
.sdot.syncing{background:#EF9F27}.sdot.ok{background:#4CAF50}.sdot.err{background:#E24B4A}
.tabs{background:var(--leaf);display:flex;flex-shrink:0;border-bottom:1px solid rgba(251,235,223,0.08);overflow-x:auto}
.tab{flex:1;min-width:55px;padding:10px 4px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;background:none;color:rgba(251,235,223,0.4);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;letter-spacing:.04em;font-family:'Figtree',sans-serif;text-transform:uppercase}
.tab.active{color:var(--cream);border-bottom:2px solid var(--cream)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 28px);max-width:400px;pointer-events:none}
.toast{background:var(--leaf);color:var(--cream);padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:all;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast.err{background:#8B1A1A}
.tundo{font-size:12px;font-weight:700;cursor:pointer;color:rgba(251,235,223,0.65);text-decoration:underline}
.mwrap{position:fixed;inset:0;background:rgba(25,51,48,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 14px 24px}
.mbox{background:var(--cream);border-radius:var(--rl);padding:20px;width:100%;max-width:400px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:5px}
.msub{font-size:13px;color:var(--dim);margin-bottom:16px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-dark{background:var(--leaf);border:none;border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-mint{background:var(--mint);border:1px solid rgba(25,51,48,0.1);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.lbl-c{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(251,235,223,0.5);margin-bottom:8px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:12px}
.mlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.mval{font-size:22px;font-weight:800;color:var(--leaf);line-height:1}
.msub2{font-size:11px;color:var(--muted);margin-top:3px}
.metric.warn{background:var(--warn-bg);border-color:var(--warn-b)}.metric.warn .mval{color:var(--warn-t)}
.metric.danger{background:var(--danger-bg);border-color:var(--danger-b)}.metric.danger .mval{color:var(--danger-t)}
.fnum{font-size:32px;font-weight:800;color:var(--cream);line-height:1}
.ftrack{height:22px;background:rgba(251,235,223,0.12);border-radius:6px;overflow:hidden;margin:10px 0 6px}
.ffill{height:100%;background:var(--cream);border-radius:6px;transition:width .5s ease}
.ffill.warn{background:#EF9F27}.ffill.danger{background:#E24B4A}
.frow{display:flex;justify-content:space-between;font-size:11px;color:rgba(251,235,223,0.5)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.bok{background:var(--ok-bg);color:var(--ok-t);border:1px solid rgba(26,92,53,0.2)}
.bwarn{background:var(--warn-bg);color:var(--warn-t);border:1px solid var(--warn-b)}
.binfo{background:var(--mint);color:var(--leaf);border:1px solid var(--bdr2)}
.bdanger{background:var(--danger-bg);color:var(--danger-t);border:1px solid var(--danger-b)}
.bneutral{background:rgba(25,51,48,0.06);color:var(--dim);border:1px solid var(--bdr)}
.bpurple{background:#EEEDFE;color:#3C3489;border:1px solid rgba(83,74,183,0.2)}
.bcoral{background:#FAECE7;color:#712B13;border:1px solid rgba(153,60,29,0.2)}
.arow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.arow:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dw{background:#D4831A}.dd{background:#C0392B}.dok{background:#193330}
.orow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.orow:last-child{border-bottom:none}
.oinfo{flex:1;min-width:0}
.oname{font-size:14px;font-weight:700}
.ometa{font-size:12px;color:var(--muted);margin-top:2px}
.oqty{font-size:11px;color:rgba(25,51,48,0.4);margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;font-size:13px;font-weight:700;border-radius:var(--r);cursor:pointer;font-family:'Figtree',sans-serif;border:1.5px solid var(--leaf);background:transparent;color:var(--leaf);transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.6}
.bsm{padding:6px 11px;font-size:12px;border-radius:8px}
.bprimary{background:var(--leaf);color:var(--cream);border-color:var(--leaf)}
.bghost{border-color:var(--bdr2);color:var(--dim)}
.bdanger2{border-color:var(--danger-b);color:var(--danger-t);background:transparent}
.bsuccess{background:var(--mint);color:var(--leaf);border-color:rgba(25,51,48,0.2)}
.bfull{width:100%;margin-top:10px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.fi{font-size:15px;padding:11px 13px;border:1.5px solid var(--bdr2);border-radius:var(--r);background:#fff;color:var(--leaf);width:100%;font-family:'Figtree',sans-serif;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--leaf)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fchk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;margin-top:10px}
.fchk input{width:18px;height:18px;accent-color:var(--leaf)}
.ebox{background:var(--mint);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;font-size:13px;line-height:1.8;margin-top:8px}
.wbox{background:var(--warn-bg);border:1px solid var(--warn-b);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--warn-t);margin-top:8px}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
.divider{height:1px;background:var(--bdr);margin:14px 0}
.empty{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px}
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.pcol{flex:0 0 200px;background:rgba(25,51,48,0.05);border:1px solid var(--bdr);border-radius:var(--r);padding:10px}
.pchdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pcard{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:11px;margin-bottom:8px}
.pcard:last-child{margin-bottom:0}
.pctitle{font-size:13px;font-weight:700;margin-bottom:4px}
.pcmeta{font-size:12px;color:var(--dim);line-height:1.7}
.pcactions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.crow:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--leaf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--cream);flex-shrink:0;letter-spacing:.04em}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none}
.slbl{font-size:14px;font-weight:600}
.ssub2{font-size:11px;color:var(--muted);margin-top:2px}
.sinput{width:90px;font-size:14px;font-weight:700;padding:7px 10px;border:1.5px solid var(--bdr2);border-radius:8px;background:#fff;color:var(--leaf);text-align:right;font-family:'Figtree',sans-serif}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.rrow:last-child{border-bottom:none}
.rlbl{color:var(--dim)}.rval{font-weight:700}.rval.g{color:var(--ok-t)}
.seg{display:flex;gap:0;margin-bottom:14px;border:1.5px solid var(--bdr2);border-radius:var(--r);overflow:hidden}
.seg-btn{flex:1;padding:10px 6px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--dim);font-family:'Figtree',sans-serif;border-right:1px solid var(--bdr2)}
.seg-btn:last-child{border-right:none}
.seg-btn.active{background:var(--leaf);color:var(--cream)}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.inv-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:10px}
.inv-name{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.inv-val{font-size:18px;font-weight:800;color:var(--leaf)}
.inv-sub{font-size:11px;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:700;color:var(--muted);padding:5px;border-bottom:1px solid var(--bdr);text-align:left;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:8px 5px;border-bottom:1px solid rgba(25,51,48,0.06);vertical-align:middle}
tr:last-child td{border-bottom:none}
.twrap{overflow-x:auto}
.setup-step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.snum{width:28px;height:28px;border-radius:50%;background:var(--leaf);color:var(--cream);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbody{font-size:13px;color:var(--dim);line-height:1.6;flex:1}
code{background:rgba(25,51,48,0.07);padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div class="hdr">
  <svg viewBox="0 0 28 28" fill="none">
    <ellipse cx="14" cy="13" rx="7" ry="9" stroke="#FBEBDF" stroke-width="1.2" fill="none"/>
    <path d="M14 7.5 Q15.8 10 14 13 Q12.2 10 14 7.5Z" stroke="#FBEBDF" stroke-width="1" fill="none"/>
    <path d="M8 16.5 Q11 14.8 14 15.5 Q17 14.8 20 16.5" stroke="#FBEBDF" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M8.5 19 Q11.2 17.5 14 18.2 Q16.8 17.5 19.5 19" stroke="#FBEBDF" stroke-width="1" fill="none" stroke-linecap="round"/>
  </svg>
  <div><div class="hbrand">ANDES RESERVE</div><div class="hsub">OPS TRACKER</div></div>
  <div class="hright"><div class="hdate" id="hdr-date"></div><span class="sdot" id="sdot" style="display:none"></span></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="nav('today')">Today</button>
  <button class="tab" onclick="nav('orders')">Orders</button>
  <button class="tab" onclick="nav('supply')">Supply</button>
  <button class="tab" onclick="nav('customers')">Customers</button>
  <button class="tab" onclick="nav('settings')">Settings</button>
</div>
<div id="sync-bar" style="display:none;align-items:center;justify-content:space-between;padding:6px 14px;font-size:11px;flex-shrink:0;transition:background .3s"></div>
<div class="scroll" id="page"></div>
<div class="toast-wrap" id="toast-area"></div>
<div id="modal-root"></div>
<script>

const DEF={fridgeCap:45,roastRatio:0.8,brewRatio:4.3,warnerKgPerBag:20,cavKgPerBag:20,price10L:175,price15L:26.25,gstRate:0.1,priceGreenKg:8,priceRoastedKg:22};
const DEF_VARIETALS=[{id:'cauca',name:'Cauca Blend'},{id:'huila',name:'Huila Blend'},{id:'pink',name:'Pink Bourbon'},{id:'geisha',name:'Geisha'}];
let cfg={...DEF};
let varietals=[...DEF_VARIETALS];
// inventory: {[varietalId]: {warnerBags:0, cavaliersBags:0}}
let db={
  coldBrewCustomers:[],greenRoastedCustomers:[],
  coldBrewOrders:[],greenRoastedOrders:[],
  roasts:[],brews:[],fridgeMoves:[],greenLog:[],
  inventory:{}
};
let currentTab='today';
let currentOrderType='coldBrew'; // for orders tab
let currentCustType='coldBrew';  // for customers tab
let editingOrderId=null;
let podOrderId=null; // when set, shows POD screen instead of normal page
let supplySubTab='pipeline'; // 'pipeline' | 'manage'
let showOrderForm=false;     // controls FAB sheet visibility
let lastSyncTime=null;       // timestamp of last successful sync
let syncStatus='idle';       // 'idle'|'syncing'|'ok'|'err'|'offline'

function getApiUrl(){return localStorage.getItem('arops_api_url')||'';}

async function apiCall(action,payload={}){
  const url=getApiUrl();if(!url)throw new Error('NO_URL');
  setSync('syncing');
  try{
    const encoded=encodeURIComponent(JSON.stringify(payload));
    const r=await fetch(`${url}?action=${action}&payload=${encoded}`,{method:'GET',redirect:'follow'});
    const text=await r.text();
    const j=JSON.parse(text);
    if(!j.ok)throw new Error(j.error||'API error');
    setSync('ok');return j.data;
  }catch(e){setSync('err');throw e;}
}

function setSync(s){
  syncStatus=s;
  const d=document.getElementById('sdot');
  if(d){d.className='sdot '+s;clearTimeout(window._st);if(s==='ok')window._st=setTimeout(()=>{d.className='sdot';},2500);}
  if(s==='ok')lastSyncTime=new Date();
  updateSyncBar();
}
function updateSyncBar(){
  const bar=document.getElementById('sync-bar');if(!bar)return;
  const url=getApiUrl();
  if(!url){bar.style.display='none';return;}
  bar.style.display='flex';
  if(syncStatus==='syncing'){bar.style.background='#FFF3E0';bar.style.color='#8B4A00';bar.innerHTML='<span style="font-size:11px;font-weight:600">Syncing...</span>';}
  else if(syncStatus==='err'){bar.style.background='#FFF0F0';bar.style.color='#8B1A1A';bar.innerHTML='<span style="font-size:11px;font-weight:600">Offline — saved locally</span><button onclick="loadAll()" style="font-size:11px;font-weight:700;background:none;border:none;color:#8B1A1A;text-decoration:underline;cursor:pointer;margin-left:8px">Retry</button>';}
  else if(lastSyncTime){const ago=Math.round((new Date()-lastSyncTime)/1000);const txt=ago<60?`${ago}s ago`:ago<3600?`${Math.floor(ago/60)}m ago`:'a while ago';bar.style.background='#E8F5EE';bar.style.color='#1a5c35';bar.innerHTML=`<span style="font-size:11px;font-weight:600">Synced · ${txt}</span>`;}
  else{bar.style.display='none';}
}
function saveLocal(){try{localStorage.setItem('arops_cache',JSON.stringify({cfg,db,varietals}));}catch(e){}}
function loadLocal(){
  try{
    const c=localStorage.getItem('arops_cache');
    if(c){
      const d=JSON.parse(c);
      cfg={...DEF,...(d.cfg||{})};
      varietals=d.varietals&&d.varietals.length?d.varietals:[...DEF_VARIETALS];
      db={...db,...(d.db||{})};
      // ensure all varietal inventory keys exist
      varietals.forEach(v=>{if(!db.inventory[v.id])db.inventory[v.id]={warnerBags:0,cavaliersBags:0};});
      return true;
    }
  }catch(e){}
  return false;
}

async function loadAll(){
  loadLocal();render();
  const url=getApiUrl();if(!url)return;
  try{
    const data=await apiCall('getAll');
    cfg={...DEF,...(data.settings||{})};
    if(data.inventory)db.inventory=data.inventory;
    if(data.coldBrewCustomers)db.coldBrewCustomers=data.coldBrewCustomers;
    if(data.greenRoastedCustomers)db.greenRoastedCustomers=data.greenRoastedCustomers;
    if(data.coldBrewOrders)db.coldBrewOrders=data.coldBrewOrders;
    if(data.greenRoastedOrders)db.greenRoastedOrders=data.greenRoastedOrders;
    if(data.roasts)db.roasts=data.roasts;
    if(data.brews)db.brews=data.brews;
    if(data.fridgeMoves)db.fridgeMoves=data.fridgeMoves;
    if(data.greenLog)db.greenLog=data.greenLog;
    if(data.settings&&data.settings.varietals){try{varietals=JSON.parse(data.settings.varietals);}catch(e){}}
    varietals.forEach(v=>{if(!db.inventory[v.id])db.inventory[v.id]={warnerBags:0,cavaliersBags:0};});
    // Normalise legacy orders — fix status and recurring fields from old schema
    db.coldBrewOrders=db.coldBrewOrders.map(normaliseLegacyOrder);
    db.greenRoastedOrders=db.greenRoastedOrders.map(normaliseLegacyOrder);
    // Fix ISO timestamps in roasts, brews, fridgeMoves
    const fixDate=d=>d&&d.length>10?d.slice(0,10):d||'';
    db.roasts=db.roasts.map(r=>({...r,date:fixDate(r.date),pickupDate:fixDate(r.pickupDate)}));
    db.brews=db.brews.map(b=>({...b,brewDate:fixDate(b.brewDate),pickupDate:fixDate(b.pickupDate)}));
    db.fridgeMoves=db.fridgeMoves.map(m=>({...m,date:fixDate(m.date)}));
    db.greenLog=db.greenLog.map(l=>({...l,date:fixDate(l.date)}));
    saveLocal();setSync('ok');render();
  }catch(e){if(e.message!=='NO_URL'){setSync('err');showToastErr('Could not sync — using cached data');}}
}

async function saveRow(col,action,row){
  const arr=db[col];const idx=arr.findIndex(r=>String(r.id)===String(row.id));
  if(idx>=0)arr[idx]=row;else arr.push(row);
  saveLocal();
  const url=getApiUrl();if(url){try{await apiCall(action,{row});}catch(e){showToastErr('Sync failed — saved locally');}}
}
async function delRow(col,action,id){
  db[col]=db[col].filter(r=>String(r.id)!==String(id));saveLocal();
  const url=getApiUrl();if(url){try{await apiCall(action,{id});}catch(e){showToastErr('Sync failed');}}
}
async function syncInv(){saveLocal();const url=getApiUrl();if(url){try{await apiCall('saveInventory',{inventory:db.inventory});}catch(e){}}}
async function syncCfg(){
  const toSave={...cfg,varietals:JSON.stringify(varietals)};
  saveLocal();const url=getApiUrl();if(url){try{await apiCall('saveSettings',{settings:toSave});}catch(e){}}
}

const T=()=>new Date().toISOString().slice(0,10);

// Normalise orders that were saved with the old schema
function normaliseLegacyOrder(o){
  // Fix status: old schema stored status in 'recurring' field
  // e.g. recurring:"pending", recurring:"fulfilled" — should be status field
  if(!o.status||o.status===''){
    if(o.recurring==='fulfilled'||o.fulfilledDate){
      o.status='fulfilled';
      o.recurring=false;
    } else {
      o.status='pending';
      o.recurring=false;
    }
  }
  // Fix recurring: should be boolean
  if(o.recurring==='pending'||o.recurring==='')o.recurring=false;
  if(o.recurring==='true')o.recurring=true;
  // Fix orderType
  if(!o.orderType)o.orderType='coldBrew';
  // Fix date: strip time component from ISO timestamps
  if(o.date&&o.date.length>10)o.date=o.date.slice(0,10);

  if(o.fulfilledDate&&o.fulfilledDate.length>10)o.fulfilledDate=o.fulfilledDate.slice(0,10);

}

const fmtD=d=>{if(!d)return'—';const s=String(d);const iso=s.length>10?s.slice(0,10):s;const p=iso.split('-');if(p.length<3)return s;return`${p[2].slice(0,2)}/${p[1]}/${p[0]}`;};
const fmtA=n=>'$'+Number(n||0).toFixed(2);
const dUntil=ds=>{if(!ds)return 999;const n=new Date();n.setHours(0,0,0,0);const p=String(ds).slice(0,10).split('-');const t=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));return Math.round((t-n)/86400000);};
const wStart=ds=>{if(!ds)return'';const parts=ds.split('-');const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;};
const wLabel=ws=>{if(!ws)return'';const parts=ws.split('-');const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));const s=new Date(d);s.setDate(d.getDate()+6);const sy=s.getFullYear(),sm=String(s.getMonth()+1).padStart(2,'0'),sd=String(s.getDate()).padStart(2,'0');const sunStr=`${sy}-${sm}-${sd}`;return`${fmtD(ws)} – ${fmtD(sunStr)}`;};
const nextThu=()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+((4-d.getDay()+7)%7||7));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const cutoff=del=>{if(!del)return'';const d=new Date(del);d.setDate(d.getDate()-7);while(d.getDay()!==4)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);};

function fridgeStock(){
  let b10=0,u15=0;
  (db.fridgeMoves||[]).forEach(m=>{const s=m.type==='in'?1:-1;b10+=s*(Number(m.boxes10L)||0);u15+=s*(Number(m.units15L)||0);});
  return{boxes10L:Math.max(0,b10),units15L:Math.max(0,u15)};
}

function totalCavKg(){
  return varietals.reduce((a,v)=>{
    const inv=db.inventory[v.id]||{};
    return a+(Number(inv.cavaliersBags)||0)*(cfg.cavKgPerBag||20);
  },0);
}
function totalWarnerKg(){
  return varietals.reduce((a,v)=>{
    const inv=db.inventory[v.id]||{};
    return a+(Number(inv.warnerBags)||0)*(cfg.warnerKgPerBag||20);
  },0);
}

function cbOrderRev(o){
  const c=db.coldBrewCustomers.find(x=>x.name===o.customerName||x.id===o.customerId);
  const p10=Number((c&&c.price10L)||cfg.price10L||175);
  const p15=Number((c&&c.price15L)||cfg.price15L||26.25);
  const ex=(Number(o.boxes10L)||0)*p10+(Number(o.units15L)||0)*p15;
  const gst=ex*(Number(cfg.gstRate)||0.1);
  return{ex:+ex.toFixed(2),gst:+gst.toFixed(2),inc:+(ex+gst).toFixed(2)};
}
function grOrderRev(o){
  const c=db.greenRoastedCustomers.find(x=>x.name===o.customerName||x.id===o.customerId);
  let pricePerKg=0;
  if(o.orderType==='green'){
    const vp=c&&c.varietalPrices&&c.varietalPrices[o.varietal];
    pricePerKg=Number(vp||cfg.priceGreenKg||8);
  } else {
    const vp=c&&c.varietalPrices&&c.varietalPrices[o.varietal];
    pricePerKg=Number(vp||cfg.priceRoastedKg||22);
  }
  const ex=(Number(o.kg)||0)*pricePerKg;
  const gst=ex*(Number(cfg.gstRate)||0.1);
  return{ex:+ex.toFixed(2),gst:+gst.toFixed(2),inc:+(ex+gst).toFixed(2),pricePerKg};
}

function directFulfilCB(i){
  const o=db.coldBrewOrders[i];if(!o)return;
  const prev={...o};const r=cbOrderRev(o);
  o.status='fulfilled';o.fulfilledDate=T();o.revenueExGst=r.ex;o.gst=r.gst;o.revenueIncGst=r.inc;
  const mv={id:uid(),date:T(),type:'out-inter',boxes10L:Number(o.boxes10L)||0,units15L:Number(o.units15L)||0,slots:slots(Number(o.boxes10L)||0,Number(o.units15L)||0),notes:`Order: ${o.customerName}`,source:'auto',createdAt:new Date().toISOString()};
  db.fridgeMoves.push(mv);

  showToast(`${o.customerName} fulfilled — ${fmtA(r.inc)}`,()=>{db.coldBrewOrders[i]=prev;db.fridgeMoves=db.fridgeMoves.filter(m=>m.id!==mv.id);saveRow('coldBrewOrders','saveOrder',prev);delRow('fridgeMoves','deleteFridgeMove',mv.id);renderColdBrewOrders();});

}

    const ro=pr.length?pr.map((r,i)=>`<option value="${i}">${fmtD(r.date)} — ${varName(r.varietal)} ${r.roastedKg}kg</option>`).join(''):'';
    const rCards=pr.map(r=>{

      const b=d<0?'<span class="badge bdanger">Overdue</span>':d===0?'<span class="badge bwarn">Today</span>':'<span class="badge binfo">Sched</span>';
      return`<div class="pcard"><div class="pctitle">${fmtD(r.date)} ${b}</div><div class="pcmeta">${varName(r.varietal)}<br>Green: ${r.greenKg} kg<br>Roasted: ${r.roastedKg} kg${r.varietal==='cauca'?`<br>Est: ${r.estBoxes10L}×10L + ${r.estUnits15L}×1.5L`:''}</div><div class="pcactions"><button class="btn bsm bsuccess" onclick="doneRoast('${r.id}')">Done</button><button class="btn bsm bdanger2" onclick="delRoast('${r.id}')">Del</button></div></div>`;
    }).join('')||'<div style="font-size:12px;color:var(--muted);padding:6px 0">None scheduled</div>';
    const bCards=pbr.map(b=>{

  } else {

      const cKg=(Number(inv.cavaliersBags)||0)*(cfg.cavKgPerBag||20);

    }).join('');

    document.getElementById('page').innerHTML=`
      ${subTabs}
      <div class="card"><div class="lbl">Fridge adjustment</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button id="fadj-in" onclick="setFridgeAdjType('in')" style="flex:1;border:1.5px solid var(--bdr2);border-radius:var(--r);padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Figtree',sans-serif;background:var(--leaf);color:var(--cream)">Stock in</button>
          <button id="fadj-out" onclick="setFridgeAdjType('out')" style="flex:1;border:1.5px solid var(--bdr2);border-radius:var(--r);padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Figtree',sans-serif;background:transparent;color:var(--dim)">Stock out</button>
        </div>
        <div class="fr"><div class="fg"><label class="fl">10L boxes</label><input class="fi" id="fadj-10L" type="number" min="0" placeholder="0"></div><div class="fg"><label class="fl">1.5L units</label><input class="fi" id="fadj-15L" type="number" min="0" placeholder="0"></div></div>
        <div class="fg"><label class="fl">Reason / notes</label><input class="fi" id="fadj-notes" type="text" placeholder="e.g. existing stock, write-off"></div>
        <button class="btn bprimary bfull" onclick="addFridgeAdj()">Update fridge</button>
      </div>
      <div class="card"><div class="lbl">Schedule a roast</div>
        <div class="fr"><div class="fg"><label class="fl">Varietal</label><select class="fi" id="r-var">${varOpts('cauca')}</select></div><div class="fg"><label class="fl">Roasted kg needed</label><input class="fi" id="r-kg" type="number" step="0.1" min="0.1" placeholder="0" oninput="rEst()"></div></div>
        <div class="fr"><div class="fg"><label class="fl">Roast date</label><input class="fi" id="r-date" type="date" value="${T()}"></div><div class="fg"><label class="fl">Pickup date</label><input class="fi" id="r-pickup" type="date" value="${T()}"></div></div>
        <div class="fg"><label class="fl">Notes</label><input class="fi" id="r-notes" type="text" placeholder="optional"></div>
        <div id="r-est" class="ebox" style="display:none"></div>
        <div id="r-warn" class="wbox" style="display:none"></div>
        <button class="btn bprimary bfull" onclick="addRoast()">Schedule roast</button>
      </div>
      <div class="card"><div class="lbl">Log a brew batch (Cauca only)</div>
        ${ro?`<div class="fg"><label class="fl">Based on roast</label><select class="fi" id="b-ref" onchange="bPrefill()"><option value="">— manual —</option>${ro}</select></div>`:''}
        <div class="fr"><div class="fg"><label class="fl">Brew date</label><input class="fi" id="b-date" type="date" value="${T()}"></div><div class="fg"><label class="fl">Pickup date</label><input class="fi" id="b-pickup" type="date" value="${T()}"></div></div>

function gfr(rKg){return+((rKg/(cfg.roastRatio||0.8)).toFixed(2));}
function bEst(rKg){const L=rKg*(cfg.brewRatio||4.3),b10=Math.floor(L/10),rem=L-b10*10,u15=Math.floor(rem/1.5);return{L:+L.toFixed(1),b10,u15,waste:+(rem-u15*1.5).toFixed(2)};}

function rEst(){
  const rKg=parseFloat(document.getElementById('r-kg').value)||0;
  const vid=document.getElementById('r-var').value;
  const e=document.getElementById('r-est'),w=document.getElementById('r-warn');
  if(!rKg){e.style.display='none';w.style.display='none';return;}
  const gKg=gfr(rKg);
  const inv=db.inventory[vid]||{};
  const cTot=(Number(inv.cavaliersBags)||0)*(cfg.cavKgPerBag||20);
  e.style.display='block';
  let html=`<span style="color:var(--dim)">Green needed: </span><strong>${gKg} kg</strong> → <strong>${rKg} kg</strong> roasted`;
  if(vid==='cauca'){const est=bEst(rKg);html+=` → <strong>${est.L} L</strong><br><strong>${est.b10}×10L + ${est.u15}×1.5L</strong> <span style="color:var(--muted)">(${est.waste} L waste)</span>`;}
  e.innerHTML=html;
  if(gKg>cTot){w.style.display='block';w.textContent=`Cavaliers only has ${cTot} kg of ${varName(vid)} — need ${gKg} kg.`;}else w.style.display='none';
}

function addRoast(){
  const d=document.getElementById('r-date').value,p=document.getElementById('r-pickup').value;
  const rKg=parseFloat(document.getElementById('r-kg').value)||0,vid=document.getElementById('r-var').value;
  if(!d||!rKg)return;
  const gKg=gfr(rKg),est=bEst(rKg);
  const row={id:uid(),varietal:vid,varietalName:varName(vid),date:d,pickupDate:p,greenKg:gKg,roastedKg:rKg,estBoxes10L:est.b10,estUnits15L:est.u15,actualBoxes10L:0,actualUnits15L:0,status:'scheduled',notes:document.getElementById('r-notes').value.trim(),createdAt:new Date().toISOString()};
  document.getElementById('r-kg').value='';document.getElementById('r-est').style.display='none';document.getElementById('r-warn').style.display='none';
  saveRow('roasts','saveRoast',row);renderSupply();showToast('Roast scheduled');
}
function doneRoast(id){
  const r=db.roasts.find(x=>x.id===id);if(!r)return;r.status='done';
  const vid=r.varietal||'cauca';
  const kpb=cfg.cavKgPerBag||20,bags=r.greenKg/kpb;
  const inv=db.inventory[vid]||{warnerBags:0,cavaliersBags:0};
  inv.cavaliersBags=Math.max(0,(Number(inv.cavaliersBags)||0)-bags);
  db.inventory[vid]=inv;
  const log={id:uid(),date:T(),type:'roast-deduct',varietal:vid,bags:+bags.toFixed(3),kg:r.greenKg,location:'cavaliers',notes:`Roast ${fmtD(r.date)} — ${varName(vid)}`,createdAt:new Date().toISOString()};
  db.greenLog.push(log);
  saveRow('roasts','saveRoast',r);saveRow('greenLog','saveGreenLog',log);syncInv();
  renderSupply();showToast(`Roast done — ${r.greenKg}kg of ${varName(vid)} deducted`);
}
function delRoast(id){showModal('Delete roast?','',()=>{delRow('roasts','deleteRoast',id);renderSupply();});}

function bPrefill(){
  const sel=document.getElementById('b-ref'),pr=db.roasts.filter(r=>r.status!=='done'&&r.varietal==='cauca'),idx=parseInt(sel.value),e=document.getElementById('b-est');
  if(isNaN(idx)||!pr[idx]){if(e)e.style.display='none';return;}
  const r=pr[idx];
  document.getElementById('b-10L').value=r.estBoxes10L;document.getElementById('b-15L').value=r.estUnits15L;
  if(e){e.style.display='block';e.innerHTML=`<span style="color:var(--dim)">Estimate:</span> <strong>${r.estBoxes10L}×10L + ${r.estUnits15L}×1.5L</strong>`;}
}
function addBrew(){
  const d=document.getElementById('b-date').value;if(!d)return;
  const b10=parseInt(document.getElementById('b-10L').value)||0,b15=parseInt(document.getElementById('b-15L').value)||0;
  const sel=document.getElementById('b-ref'),pr=db.roasts.filter(r=>r.status!=='done'&&r.varietal==='cauca'),ri=sel?parseInt(sel.value):NaN;
  const row={id:uid(),varietal:'cauca',roastId:!isNaN(ri)&&pr[ri]?pr[ri].id:'',brewDate:d,pickupDate:document.getElementById('b-pickup').value,actual10L:b10,actual15L:b15,slots:slots(b10,b15),status:'brewing',notes:'',createdAt:new Date().toISOString()};
  document.getElementById('b-10L').value='';document.getElementById('b-15L').value='';
  saveRow('brews','saveBrew',row);renderSupply();showToast('Brew batch logged');
}
function doneBrew(id){
  const b=db.brews.find(x=>x.id===id);if(!b)return;b.status='done';
  const mv={id:uid(),date:T(),type:'in',boxes10L:Number(b.actual10L)||0,units15L:Number(b.actual15L)||0,slots:slots(Number(b.actual10L)||0,Number(b.actual15L)||0),notes:`Brew ${fmtD(b.brewDate)}`,source:'auto',createdAt:new Date().toISOString()};
  db.fridgeMoves.push(mv);saveRow('brews','saveBrew',b);saveRow('fridgeMoves','saveFridgeMove',mv);
  renderSupply();showToast(`Picked up — ${slots(Number(b.actual10L)||0,Number(b.actual15L)||0)} slots added`);
}
function delBrew(id){showModal('Delete brew batch?','',()=>{delRow('brews','deleteBrew',id);renderSupply();});}
let fridgeAdjType='in';
function setFridgeAdjType(t){
  fridgeAdjType=t;
  const inBtn=document.getElementById('fadj-in'),outBtn=document.getElementById('fadj-out');
  if(inBtn&&outBtn){
    inBtn.style.background=t==='in'?'var(--leaf)':'transparent';
    inBtn.style.color=t==='in'?'var(--cream)':'var(--dim)';
    outBtn.style.background=t==='out'?'var(--leaf)':'transparent';
    outBtn.style.color=t==='out'?'var(--cream)':'var(--dim)';
  }
}
function addFridgeAdj(){
  const b10=parseInt(document.getElementById('fadj-10L').value)||0;
  const b15=parseInt(document.getElementById('fadj-15L').value)||0;
  const notes=document.getElementById('fadj-notes').value.trim();
  if(!b10&&!b15){showToastErr('Enter at least one quantity');return;}
  const mv={id:uid(),date:T(),type:fridgeAdjType==='in'?'in':'out-manual',boxes10L:b10,units15L:b15,slots:slots(b10,b15),notes:notes||'Manual adjustment',source:'manual',createdAt:new Date().toISOString()};
  db.fridgeMoves.push(mv);
  document.getElementById('fadj-10L').value='';
  document.getElementById('fadj-15L').value='';
  document.getElementById('fadj-notes').value='';
  saveRow('fridgeMoves','saveFridgeMove',mv);
  renderSupply();
  const stk=fridgeStock();
  showToast(`Fridge updated — ${stk.boxes10L}×10L · ${stk.units15L}×1.5L · ${slots(stk.boxes10L,stk.units15L)} slots`);
}

function saveAllInv(){
  varietals.forEach(v=>{
    const wb=parseFloat(document.getElementById(`inv-w-${v.id}`).value)||0;
    const cb=parseFloat(document.getElementById(`inv-c-${v.id}`).value)||0;
    if(!db.inventory[v.id])db.inventory[v.id]={};
    db.inventory[v.id].warnerBags=wb;db.inventory[v.id].cavaliersBags=cb;
  });
  syncInv();renderSupply();showToast('Inventory saved');
}
function addGLog(){
  const type=document.getElementById('g-type').value,vid=document.getElementById('g-var').value;
  const date=document.getElementById('g-date').value,val=parseFloat(document.getElementById('g-val').value)||0;
  const notes=document.getElementById('g-notes').value.trim();
  if(!date||!val)return;
  const kpb=cfg.cavKgPerBag||20,wkpb=cfg.warnerKgPerBag||20;
  if(!db.inventory[vid])db.inventory[vid]={warnerBags:0,cavaliersBags:0};
  let bags=0,kg=0,loc='';
  if(type==='restock'){bags=val;kg=val*wkpb;loc='both';db.inventory[vid].warnerBags=Math.max(0,(Number(db.inventory[vid].warnerBags)||0)-val);db.inventory[vid].cavaliersBags=(Number(db.inventory[vid].cavaliersBags)||0)+val;}
  else if(type==='adj-cav'){kg=val;bags=val/kpb;loc='cavaliers';db.inventory[vid].cavaliersBags=Math.max(0,(Number(db.inventory[vid].cavaliersBags)||0)-bags);}
  else{kg=val;bags=val/wkpb;loc='warner';db.inventory[vid].warnerBags=Math.max(0,(Number(db.inventory[vid].warnerBags)||0)-bags);}
  const log={id:uid(),date,type,varietal:vid,bags:+bags.toFixed(3),kg,location:loc,notes,createdAt:new Date().toISOString()};
  db.greenLog.push(log);document.getElementById('g-val').value='';
  saveRow('greenLog','saveGreenLog',log);syncInv();renderSupply();
}
function dGLog(id){showModal('Remove log entry?','Inventory will be reversed.',()=>{
  const l=db.greenLog.find(x=>x.id===id);
  if(l&&l.varietal){
    if(!db.inventory[l.varietal])db.inventory[l.varietal]={warnerBags:0,cavaliersBags:0};
    if(l.type==='restock'){db.inventory[l.varietal].warnerBags=(Number(db.inventory[l.varietal].warnerBags)||0)+(Number(l.bags)||0);db.inventory[l.varietal].cavaliersBags=Math.max(0,(Number(db.inventory[l.varietal].cavaliersBags)||0)-(Number(l.bags)||0));}
    else if(l.type==='adj-cav')db.inventory[l.varietal].cavaliersBags=(Number(db.inventory[l.varietal].cavaliersBags)||0)+(Number(l.bags)||0);
    else if(l.type==='adj-war')db.inventory[l.varietal].warnerBags=(Number(db.inventory[l.varietal].warnerBags)||0)+(Number(l.bags)||0);
  }
  delRow('greenLog','deleteGreenLog',id);syncInv();renderSupply();
});}

let sigCanvas=null,sigCtx=null,sigDrawing=false,sigHasData=false;
let podPhotoDataUrl=null;

function initSigCanvas(){
  sigCanvas=document.getElementById('pod-sig-canvas');
  if(!sigCanvas)return;
  sigCtx=sigCanvas.getContext('2d');
  // Set actual pixel size
  const rect=sigCanvas.getBoundingClientRect();
  sigCanvas.width=rect.width*window.devicePixelRatio;
  sigCanvas.height=rect.height*window.devicePixelRatio;
  sigCtx.scale(window.devicePixelRatio,window.devicePixelRatio);
  sigCtx.strokeStyle='#193330';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  sigDrawing=false;sigHasData=false;

  function getPos(e){
    const r=sigCanvas.getBoundingClientRect();
    if(e.touches){return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};}
    return{x:e.clientX-r.left,y:e.clientY-r.top};
  }
  function start(e){e.preventDefault();sigDrawing=true;const p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);}
  function move(e){e.preventDefault();if(!sigDrawing)return;const p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasData=true;}
  function end(e){e.preventDefault();sigDrawing=false;}

  sigCanvas.addEventListener('mousedown',start);sigCanvas.addEventListener('mousemove',move);sigCanvas.addEventListener('mouseup',end);
  sigCanvas.addEventListener('touchstart',start,{passive:false});sigCanvas.addEventListener('touchmove',move,{passive:false});sigCanvas.addEventListener('touchend',end,{passive:false});
}

function clearSig(){
  if(!sigCanvas||!sigCtx)return;
  sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
  sigHasData=false;
}

function handlePODPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    podPhotoDataUrl=e.target.result;
    const preview=document.getElementById('pod-photo-preview');
    const img=document.getElementById('pod-photo-img');
    const btn=document.getElementById('pod-photo-btn');
    if(preview&&img){preview.style.display='block';img.src=podPhotoDataUrl;}
    if(btn)btn.textContent='Retake photo';
  };
  reader.readAsDataURL(file);
}

function submitPOD(orderId){
  const receiver=(document.getElementById('pod-receiver')||{}).value||'';
  if(!podPhotoDataUrl){showToastErr('Please take a delivery photo first');return;}
  if(!receiver.trim()){showToastErr('Please enter the receiver name');return;}
  if(!sigHasData){showToastErr('Please collect a signature');return;}
  const sigDataUrl=sigCanvas.toDataURL('image/png');
  completeFulfilCB(orderId,podPhotoDataUrl,sigDataUrl,receiver.trim());
  podPhotoDataUrl=null;
}

/* ── SEND POD EMAIL ─────────────────────────────────────── */

async function sendPODEmail(order,photoDataUrl,sigDataUrl,receiverName){
  const url=getApiUrl();if(!url)return;
  const cust=db.coldBrewCustomers.find(c=>c.name===order.customerName||c.id===order.customerId);
  const rev=cbOrderRev(order);
  // Send images as separate base64 fields — Apps Script rebuilds the HTML/PDF
  // Strip the data URL prefix to save space: "data:image/jpeg;base64,/9j/..." → "/9j/..."
  const photoB64=(photoDataUrl||'').split(',')[1]||'';
  const sigB64=(sigDataUrl||'').split(',')[1]||'';
  const photoMime=(photoDataUrl||'').split(';')[0].split(':')[1]||'image/jpeg';
  // Email is non-blocking — POD is already complete at this point
  // Clear any previous error toast before attempting
  document.getElementById('toast-area').innerHTML='';
  try{
    const result = await apiCall('sendPOD',{
      customerName:order.customerName,
      customerEmail:cust?cust.email:'',
      orderId:order.id,
      orderDate:fmtD(order.date),
      city:order.city,
      address:order.address||order.city,
      boxes10L:order.boxes10L||0,
      units15L:order.units15L||0,
      invoice:order.invoice||'',
      receiverName,
      fulfilledDate:fmtD(order.fulfilledDate||T()),
      photoB64,
      photoMime,
      sigB64
    });
    showToast('✓ POD complete — email sent to ' + (cust&&cust.email?cust.email:'orders@andesreserve.com.au'));
  }catch(e){
    // Show non-blocking warning — order is already fulfilled
    showToast('POD saved — email failed (check Apps Script permissions)');
  }
}

function renderCustomers(type,detailId){
  const isCB=(type||currentCustType)==='coldBrew';
  if(!type)type=currentCustType;else currentCustType=type;

  if(detailId!=null){
    const arr=isCB?db.coldBrewCustomers:db.greenRoastedCustomers;
    const c=arr.find(x=>x.id===detailId);if(!c)return renderCustomers(type);
    const orders=isCB
      ?db.coldBrewOrders.filter(o=>o.customerName===c.name||o.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date))
      :db.greenRoastedOrders.filter(o=>o.customerName===c.name||o.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date));
    const tRev=orders.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+(isCB?cbOrderRev(o):grOrderRev(o)).inc,0);
    const tFulf=orders.filter(o=>o.status==='fulfilled').length;

    let priceInfo='';
    if(isCB){priceInfo=`<span class="badge bneutral">${fmtA(c.price10L||cfg.price10L||175)} / 10L</span><span class="badge bneutral" style="margin-left:4px">${fmtA(c.price15L||cfg.price15L||26.25)} / 1.5L</span>`;}
    else{const vp=c.varietalPrices||{};priceInfo=varietals.map(v=>`<span class="badge bneutral" style="margin-right:4px">${v.name}: ${fmtA(vp[v.id]||0)}/kg</span>`).join('');}

    document.getElementById('page').innerHTML=`
      <button class="btn bghost" style="margin-bottom:12px" onclick="renderCustomers('${type}')">← Back</button>
      <div class="card">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div class="avatar" style="width:50px;height:50px;font-size:16px">${inits(c.name)}</div><div><div style="font-size:18px;font-weight:800">${c.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${c.city||''}${c.address?' · '+c.address:''}</div></div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${priceInfo}${c.email?`<span class="badge bneutral">${c.email}</span>`:''}</div>
        <div class="brow"><button class="btn bprimary" style="flex:1" onclick="qOrderFor('${type}','${c.id}')">New order</button><button class="btn bdanger2" onclick="delCust('${type}','${c.id}')">Delete</button></div>
      </div>
      <div class="card-mint"><div class="lbl">All-time summary</div>
        <div class="rrow"><span class="rlbl">Revenue (incl. GST)</span><span class="rval g">${fmtA(tRev)}</span></div>
        <div class="rrow"><span class="rlbl">Orders fulfilled</span><span class="rval">${tFulf}</span></div>
        ${!isCB?`<div class="rrow"><span class="rlbl">Total kg sold</span><span class="rval">${orders.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+(Number(o.kg)||0),0).toFixed(1)} kg</span></div>`:`<div class="rrow"><span class="rlbl">10L boxes sold</span><span class="rval">${orders.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+(Number(o.boxes10L)||0),0)}</span></div>`}
      </div>
      <div class="card"><div class="lbl">Order history</div>${orders.length?orders.slice(0,30).map(o=>{const d=dUntil(o.date),r=isCB?cbOrderRev(o):grOrderRev(o);const sb=o.status==='fulfilled'?'<span class="badge bok">Done</span>':d<0?'<span class="badge bdanger">Overdue</span>':d===0?'<span class="badge bwarn">Today</span>':'<span class="badge binfo">Pending</span>';const extra=isCB?`${o.boxes10L||0}×10L · ${o.units15L||0}×1.5L`:`${varName(o.varietal)} · ${o.kg||0}kg (${o.orderType})`;return`<div class="orow"><div class="oinfo"><div class="oname">${fmtD(o.date)} ${sb}</div><div class="oqty">${extra} · ${fmtA(r.inc)}</div></div></div>`;}).join(''):'<div class="empty">No orders yet</div>'}</div>`;
    return;
  }

  const arr=isCB?db.coldBrewCustomers:db.greenRoastedCustomers;
  document.getElementById('page').innerHTML=`
    <div class="seg">
      <button class="seg-btn ${isCB?'active':''}" onclick="renderCustomers('coldBrew')">Cold brew</button>
      <button class="seg-btn ${!isCB?'active':''}" onclick="renderCustomers('greenRoasted')">Green / roasted</button>
    </div>
    <div class="card"><div class="lbl">Add ${isCB?'cold brew':'green / roasted'} customer</div>
      <div class="fr"><div class="fg"><label class="fl">Name</label><input class="fi" id="c-name" type="text" placeholder="Customer name"></div><div class="fg"><label class="fl">City</label><select class="fi" id="c-city"><option>Brisbane</option><option>Sydney</option><option>Melbourne</option><option>Other</option></select></div></div>
      <div class="fg"><label class="fl">Address</label><input class="fi" id="c-addr" type="text" placeholder="optional"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="c-email" type="email" placeholder="customer@email.com"></div>
      ${isCB?`

      :`<div class="lbl" style="margin-top:4px">Price per kg (ex GST) — per varietal</div>${varietals.map(v=>`<div class="fg"><label class="fl">${v.name}</label><input class="fi" id="c-vp-${v.id}" type="number" step="0.01" placeholder="${v.id==='cauca'?cfg.priceGreenKg||8:cfg.priceGreenKg||8}"></div>`).join('')}`}
      <button class="btn bprimary bfull" onclick="addCust('${isCB?'coldBrew':'greenRoasted'}')">Add customer</button>
    </div>
    <div class="card"><div class="lbl">Directory (${arr.length})</div>${arr.length?arr.map(c=>{const n=isCB?db.coldBrewOrders.filter(o=>o.customerName===c.name&&o.status==='fulfilled').length:db.greenRoastedOrders.filter(o=>o.customerName===c.name&&o.status==='fulfilled').length;return`<div class="crow" onclick="renderCustomers('${isCB?'coldBrew':'greenRoasted'}','${c.id}')"><div class="avatar">${inits(c.name)}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">${c.name}</div><div style="font-size:12px;color:var(--muted);margin-top:1px">${c.city||''}${c.address?' · '+c.address:''}</div><div style="margin-top:4px"><span class="badge bneutral">${n} orders</span></div></div><span style="font-size:20px;color:rgba(25,51,48,0.25)">›</span></div>`;}).join(''):'<div class="empty">No customers yet</div>'}</div>`;
}

function addCust(type){
  const name=document.getElementById('c-name').value.trim();if(!name)return;
  const isCB=type==='coldBrew';
  const emailEl=document.getElementById('c-email');
  const row={id:uid(),name,city:document.getElementById('c-city').value,address:document.getElementById('c-addr').value.trim(),email:emailEl?emailEl.value.trim():'',createdAt:new Date().toISOString()};
  if(isCB){
    row.price10L=parseFloat(document.getElementById('c-p10').value)||cfg.price10L||175;
    row.price15L=parseFloat(document.getElementById('c-p15').value)||cfg.price15L||26.25;
    row.default10L=parseInt(document.getElementById('c-10L').value)||0;
    row.default15L=parseInt(document.getElementById('c-15L').value)||0;
    saveRow('coldBrewCustomers','saveCustomer',row);
  } else {
    row.varietalPrices={};
    varietals.forEach(v=>{const el=document.getElementById(`c-vp-${v.id}`);row.varietalPrices[v.id]=parseFloat(el?el.value:0)||0;});
    saveRow('greenRoastedCustomers','saveGRCustomer',row);
  }
  showToast(`${name} added`);renderCustomers(type);
}
function qOrderFor(type,cid){
  currentOrderType=type==='coldBrew'?'coldBrew':'greenRoasted';
  nav('orders');
  setTimeout(()=>{
    if(type==='coldBrew'){const pre=document.getElementById('o-pre');if(pre){pre.value=cid;prefillCB();}}
    else{const pre=document.getElementById('gr-pre');if(pre){pre.value=cid;prefillGR();}}
  },80);
}
function delCust(type,id){showModal('Delete customer?','Order history will remain.',()=>{delRow(type==='coldBrew'?'coldBrewCustomers':'greenRoastedCustomers',type==='coldBrew'?'deleteCustomer':'deleteGRCustomer',id);renderCustomers(type);});}

function addVarietal(){const n=document.getElementById('new-var').value.trim();if(!n)return;const id='v'+Date.now();varietals.push({id,name:n});db.inventory[id]={warnerBags:0,cavaliersBags:0};document.getElementById('new-var').value='';renderSettings();}
function delVarietal(i){showModal('Remove this varietal?','Inventory data for it will remain in the log.',()=>{varietals.splice(i,1);saveVarietals();renderSettings();});}
function saveVarietals(){varietals.forEach((v,i)=>{const el=document.getElementById(`var-${i}`);if(el)v.name=el.value.trim();});syncCfg();showToast('Varietals saved');}
function saveUrl(){const url=document.getElementById('s-url').value.trim();if(!url||!url.includes('script.google.com')){showToastErr('Invalid URL');return;}localStorage.setItem('arops_api_url',url);location.reload();}
function saveCfg(){
  cfg.fridgeCap=parseInt(document.getElementById('s-cap').value)||45;
  cfg.roastRatio=parseFloat(document.getElementById('s-roast').value)||0.8;
  cfg.brewRatio=parseFloat(document.getElementById('s-brew').value)||4.3;
  cfg.warnerKgPerBag=parseFloat(document.getElementById('s-wkpb').value)||20;
  cfg.cavKgPerBag=parseFloat(document.getElementById('s-ckpb').value)||20;
  cfg.price10L=parseFloat(document.getElementById('s-p10').value)||175;
  cfg.price15L=parseFloat(document.getElementById('s-p15').value)||26.25;
  cfg.priceGreenKg=parseFloat(document.getElementById('s-pgr').value)||8;
  cfg.priceRoastedKg=parseFloat(document.getElementById('s-pro').value)||22;
  cfg.gstRate=parseFloat(document.getElementById('s-gst').value)||0.1;
  syncCfg();showToast('Settings saved');
}

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
setInterval(()=>{updateSyncBar();},30000);
loadAll();
