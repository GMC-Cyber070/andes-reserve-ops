<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AR Ops">
<title>Andes Reserve — Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--leaf:#193330;--cream:#FBEBDF;--mint:#E1EAE5;--warn-bg:#FFF3E0;--warn-t:#8B4A00;--warn-b:rgba(139,74,0,0.25);--danger-bg:#FFF0F0;--danger-t:#8B1A1A;--danger-b:rgba(139,26,26,0.2);--ok-bg:#E8F5EE;--ok-t:#1a5c35;--bdr:rgba(25,51,48,0.1);--bdr2:rgba(25,51,48,0.15);--muted:rgba(25,51,48,0.45);--dim:rgba(25,51,48,0.6);--r:10px;--rl:14px}
html,body{height:100%;overflow:hidden;background:var(--cream)}
body{font-family:'Figtree',sans-serif;color:var(--leaf);display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.hdr{background:var(--leaf);padding:12px 16px 10px;flex-shrink:0;display:flex;align-items:center;gap:10px}
.hdr svg{width:28px;height:28px;flex-shrink:0}
.hbrand{font-size:13px;font-weight:800;color:var(--cream);letter-spacing:.08em}
.hsub{font-size:9px;color:rgba(251,235,223,0.5);letter-spacing:.15em;margin-top:1px}
.hright{margin-left:auto;text-align:right}
.hdate{font-size:11px;color:rgba(251,235,223,0.5)}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(251,235,223,0.3);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
.sdot.syncing{background:#EF9F27}.sdot.ok{background:#4CAF50}.sdot.err{background:#E24B4A}
.tabs{background:var(--leaf);display:flex;flex-shrink:0;border-bottom:1px solid rgba(251,235,223,0.08);overflow-x:auto}
.tab{flex:1;min-width:55px;padding:10px 4px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;background:none;color:rgba(251,235,223,0.4);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;letter-spacing:.04em;font-family:'Figtree',sans-serif;text-transform:uppercase}
.tab.active{color:var(--cream);border-bottom:2px solid var(--cream)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 28px);max-width:400px;pointer-events:none}
.toast{background:var(--leaf);color:var(--cream);padding:12px 16px;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:all;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast.err{background:#8B1A1A}
.tundo{font-size:12px;font-weight:700;cursor:pointer;color:rgba(251,235,223,0.65);text-decoration:underline}
.mwrap{position:fixed;inset:0;background:rgba(25,51,48,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 14px 24px}
.mbox{background:var(--cream);border-radius:var(--rl);padding:20px;width:100%;max-width:400px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:5px}
.msub{font-size:13px;color:var(--dim);margin-bottom:16px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-dark{background:var(--leaf);border:none;border-radius:var(--rl);padding:14px;margin-bottom:10px}
.card-mint{background:var(--mint);border:1px solid rgba(25,51,48,0.1);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.lbl-c{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(251,235,223,0.5);margin-bottom:8px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:12px}
.mlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.mval{font-size:22px;font-weight:800;color:var(--leaf);line-height:1}
.msub2{font-size:11px;color:var(--muted);margin-top:3px}
.metric.warn{background:var(--warn-bg);border-color:var(--warn-b)}.metric.warn .mval{color:var(--warn-t)}
.metric.danger{background:var(--danger-bg);border-color:var(--danger-b)}.metric.danger .mval{color:var(--danger-t)}
.fnum{font-size:32px;font-weight:800;color:var(--cream);line-height:1}
.ftrack{height:22px;background:rgba(251,235,223,0.12);border-radius:6px;overflow:hidden;margin:10px 0 6px}
.ffill{height:100%;background:var(--cream);border-radius:6px;transition:width .5s ease}
.ffill.warn{background:#EF9F27}.ffill.danger{background:#E24B4A}
.frow{display:flex;justify-content:space-between;font-size:11px;color:rgba(251,235,223,0.5)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.bok{background:var(--ok-bg);color:var(--ok-t);border:1px solid rgba(26,92,53,0.2)}
.bwarn{background:var(--warn-bg);color:var(--warn-t);border:1px solid var(--warn-b)}
.binfo{background:var(--mint);color:var(--leaf);border:1px solid var(--bdr2)}
.bdanger{background:var(--danger-bg);color:var(--danger-t);border:1px solid var(--danger-b)}
.bneutral{background:rgba(25,51,48,0.06);color:var(--dim);border:1px solid var(--bdr)}
.arow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.arow:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dw{background:#D4831A}.dd{background:#C0392B}.dok{background:#193330}
.orow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.orow:last-child{border-bottom:none}
.oinfo{flex:1;min-width:0}
.oname{font-size:14px;font-weight:700}
.ometa{font-size:12px;color:var(--muted);margin-top:2px}
.oqty{font-size:11px;color:rgba(25,51,48,0.4);margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;font-size:13px;font-weight:700;border-radius:var(--r);cursor:pointer;font-family:'Figtree',sans-serif;border:1.5px solid var(--leaf);background:transparent;color:var(--leaf);transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.6}
.bsm{padding:6px 11px;font-size:12px;border-radius:8px}
.bprimary{background:var(--leaf);color:var(--cream);border-color:var(--leaf)}
.bghost{border-color:var(--bdr2);color:var(--dim)}
.bdanger2{border-color:var(--danger-b);color:var(--danger-t);background:transparent}
.bsuccess{background:var(--mint);color:var(--leaf);border-color:rgba(25,51,48,0.2)}
.bfull{width:100%;margin-top:10px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.fi{font-size:15px;padding:11px 13px;border:1.5px solid var(--bdr2);border-radius:var(--r);background:#fff;color:var(--leaf);width:100%;font-family:'Figtree',sans-serif;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--leaf)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fchk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;margin-top:10px}
.fchk input{width:18px;height:18px;accent-color:var(--leaf)}
.ebox{background:var(--mint);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;font-size:13px;line-height:1.8;margin-top:8px}
.wbox{background:var(--warn-bg);border:1px solid var(--warn-b);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--warn-t);margin-top:8px}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
.divider{height:1px;background:var(--bdr);margin:14px 0}
.empty{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px}
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.pcol{flex:0 0 200px;background:rgba(25,51,48,0.05);border:1px solid var(--bdr);border-radius:var(--r);padding:10px}
.pchdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pcard{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:11px;margin-bottom:8px}
.pcard:last-child{margin-bottom:0}
.pctitle{font-size:13px;font-weight:700;margin-bottom:4px}
.pcmeta{font-size:12px;color:var(--dim);line-height:1.7}
.pcactions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.crow:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--leaf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--cream);flex-shrink:0;letter-spacing:.04em}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none}
.slbl{font-size:14px;font-weight:600}
.ssub2{font-size:11px;color:var(--muted);margin-top:2px}
.sinput{width:90px;font-size:14px;font-weight:700;padding:7px 10px;border:1.5px solid var(--bdr2);border-radius:8px;background:#fff;color:var(--leaf);text-align:right;font-family:'Figtree',sans-serif}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.rrow:last-child{border-bottom:none}
.rlbl{color:var(--dim)}.rval{font-weight:700}.rval.g{color:var(--ok-t)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:700;color:var(--muted);padding:5px;border-bottom:1px solid var(--bdr);text-align:left;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:8px 5px;border-bottom:1px solid rgba(25,51,48,0.06);vertical-align:middle}
tr:last-child td{border-bottom:none}
.twrap{overflow-x:auto}
.setup-step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.snum{width:28px;height:28px;border-radius:50%;background:var(--leaf);color:var(--cream);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbody{font-size:13px;color:var(--dim);line-height:1.6;flex:1}
code{background:rgba(25,51,48,0.07);padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div class="hdr">
  <svg viewBox="0 0 28 28" fill="none">
    <ellipse cx="14" cy="13" rx="7" ry="9" stroke="#FBEBDF" stroke-width="1.2" fill="none"/>
    <path d="M14 7.5 Q15.8 10 14 13 Q12.2 10 14 7.5Z" stroke="#FBEBDF" stroke-width="1" fill="none"/>
    <path d="M8 16.5 Q11 14.8 14 15.5 Q17 14.8 20 16.5" stroke="#FBEBDF" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M8.5 19 Q11.2 17.5 14 18.2 Q16.8 17.5 19.5 19" stroke="#FBEBDF" stroke-width="1" fill="none" stroke-linecap="round"/>
  </svg>
  <div><div class="hbrand">ANDES RESERVE</div><div class="hsub">OPS TRACKER</div></div>
  <div class="hright"><div class="hdate" id="hdr-date"></div><span class="sdot" id="sdot"></span></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="nav('today')">Today</button>
  <button class="tab" onclick="nav('orders')">Orders</button>
  <button class="tab" onclick="nav('supply')">Supply</button>
  <button class="tab" onclick="nav('customers')">Customers</button>
  <button class="tab" onclick="nav('settings')">Settings</button>
</div>
<div class="scroll" id="page"></div>
<div class="toast-wrap" id="toast-area"></div>
<div id="modal-root"></div>
<script>
const DEF={fridgeCap:45,roastRatio:0.8,brewRatio:4.3,warnerKgPerBag:20,cavKgPerBag:20,price10L:175,price15L:26.25,gstRate:0.1};
let cfg={...DEF};
let db={customers:[],orders:[],roasts:[],brews:[],fridgeMoves:[],greenLog:[],inventory:{warnerBags:0,cavaliersBags:0}};
let currentTab='today';

function getApiUrl(){return localStorage.getItem('arops_api_url')||'';}

async function apiCall(action,payload={}){
  const url=getApiUrl();if(!url)throw new Error('NO_URL');
  setSync('syncing');
  try{
    const encoded=encodeURIComponent(JSON.stringify(payload));
    const r=await fetch(`${url}?action=${action}&payload=${encoded}`,{method:'GET',redirect:'follow'});
    const text=await r.text();
    const j=JSON.parse(text);
    if(!j.ok)throw new Error(j.error||'API error');
    setSync('ok');return j.data;
  }catch(e){setSync('err');throw e;}
}

function setSync(s){const d=document.getElementById('sdot');if(d){d.className='sdot '+s;clearTimeout(window._st);if(s==='ok')window._st=setTimeout(()=>{d.className='sdot';},2500);}}
function saveLocal(){try{localStorage.setItem('arops_cache',JSON.stringify({cfg,db}));}catch(e){}}
function loadLocal(){try{const c=localStorage.getItem('arops_cache');if(c){const d=JSON.parse(c);cfg={...DEF,...(d.cfg||{})};db={...db,...(d.db||{})};return true;}}catch(e){}return false;}

async function loadAll(){
  loadLocal();render();
  const url=getApiUrl();if(!url)return;
  try{
    const data=await apiCall('getAll');
    cfg={...DEF,...(data.settings||{})};
    if(data.inventory)db.inventory=data.inventory;
    if(data.customers)db.customers=data.customers;
    if(data.orders)db.orders=data.orders;
    if(data.roasts)db.roasts=data.roasts;
    if(data.brews)db.brews=data.brews;
    if(data.fridgeMoves)db.fridgeMoves=data.fridgeMoves;
    if(data.greenLog)db.greenLog=data.greenLog;
    saveLocal();render();
  }catch(e){if(e.message!=='NO_URL')showToastErr('Could not sync — using cached data');}
}

async function saveRow(col,action,row){
  const arr=db[col];const idx=arr.findIndex(r=>String(r.id)===String(row.id));
  if(idx>=0)arr[idx]=row;else arr.push(row);
  saveLocal();
  const url=getApiUrl();if(url){try{await apiCall(action,{row});}catch(e){showToastErr('Sync failed — saved locally');}}
}
async function delRow(col,action,id){
  db[col]=db[col].filter(r=>String(r.id)!==String(id));saveLocal();
  const url=getApiUrl();if(url){try{await apiCall(action,{id});}catch(e){showToastErr('Sync failed');}}
}
async function syncInv(){saveLocal();const url=getApiUrl();if(url){try{await apiCall('saveInventory',{inventory:db.inventory});}catch(e){}}}
async function syncCfg(){saveLocal();const url=getApiUrl();if(url){try{await apiCall('saveSettings',{settings:cfg});}catch(e){}}}

const T=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmtD=d=>{if(!d)return'—';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`;};
const fmtA=n=>'$'+Number(n||0).toFixed(2);
const dUntil=ds=>{const n=new Date();n.setHours(0,0,0,0);const t=new Date(ds);t.setHours(0,0,0,0);return Math.round((t-n)/86400000);};
const wStart=ds=>{const d=new Date(ds);const diff=d.getDay()===0?-6:1-d.getDay();const m=new Date(d);m.setDate(d.getDate()+diff);return m.toISOString().slice(0,10);};
const wLabel=ws=>{const d=new Date(ws);const s=new Date(d);s.setDate(d.getDate()+6);return`${fmtD(ws)} – ${fmtD(s.toISOString().slice(0,10))}`;};
const nextThu=()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+((4-d.getDay()+7)%7||7));return d.toISOString().slice(0,10);};
const cutoff=del=>{if(!del)return'';const d=new Date(del);d.setDate(d.getDate()-7);while(d.getDay()!==4)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);};
const slots=(b,u)=>b+Math.ceil((u||0)/4);
const cavKg=()=>(Number(db.inventory.cavaliersBags)||0)*(cfg.cavKgPerBag||20);
const warnerKg=()=>(Number(db.inventory.warnerBags)||0)*(cfg.warnerKgPerBag||20);
const gfr=rKg=>+((rKg/(cfg.roastRatio||0.8)).toFixed(2));
const bEst=rKg=>{const L=rKg*(cfg.brewRatio||4.3),b10=Math.floor(L/10),rem=L-b10*10,u15=Math.floor(rem/1.5);return{L:+L.toFixed(1),b10,u15,waste:+(rem-u15*1.5).toFixed(2)};};
const inits=n=>n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();

function fridgeStock(){
  let b10=0,u15=0;
  (db.fridgeMoves||[]).forEach(m=>{const s=m.type==='in'?1:-1;b10+=s*(Number(m.boxes10L)||0);u15+=s*(Number(m.units15L)||0);});
  return{boxes10L:Math.max(0,b10),units15L:Math.max(0,u15)};
}
function orderRev(o){
  const c=db.customers.find(x=>x.name===o.customerName||x.id===o.customerId);
  const p10=Number((c&&c.price10L)||cfg.price10L||175);
  const p15=Number((c&&c.price15L)||cfg.price15L||26.25);
  const ex=(Number(o.boxes10L)||0)*p10+(Number(o.units15L)||0)*p15;
  const gst=ex*(Number(cfg.gstRate)||0.1);
  return{ex:+ex.toFixed(2),gst:+gst.toFixed(2),inc:+(ex+gst).toFixed(2)};
}

function showToast(msg,undoFn){
  const a=document.getElementById('toast-area');
  a.innerHTML=`<div class="toast"><span>${msg}</span>${undoFn?`<span class="tundo" onclick="handleUndo()">Undo</span>`:''}</div>`;
  window._uf=undoFn||null;clearTimeout(window._tt);
  window._tt=setTimeout(()=>{a.innerHTML='';window._uf=null;},4000);
}
function showToastErr(msg){const a=document.getElementById('toast-area');a.innerHTML=`<div class="toast err"><span>${msg}</span></div>`;clearTimeout(window._tt);window._tt=setTimeout(()=>{a.innerHTML='';},4000);}
function handleUndo(){if(window._uf){window._uf();document.getElementById('toast-area').innerHTML='';window._uf=null;}}
function showModal(t,s,fn){document.getElementById('modal-root').innerHTML=`<div class="mwrap" onclick="closeModal()"><div class="mbox" onclick="event.stopPropagation()"><div class="mtitle">${t}</div>${s?`<div class="msub">${s}</div>`:'<div style="height:8px"></div>'}<div style="display:flex;gap:8px"><button class="btn bdanger2" style="flex:1" onclick="myes()">Delete</button><button class="btn bghost" style="flex:1" onclick="closeModal()">Cancel</button></div></div></div>`;window._my=fn;}
function myes(){if(window._my){window._my();closeModal();}}
function closeModal(){document.getElementById('modal-root').innerHTML='';window._my=null;}

function nav(t){currentTab=t;document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['today','orders','supply','customers','settings'][i]===t);});document.getElementById('page').scrollTop=0;render();}
function render(){closeModal();if(currentTab==='today')renderToday();else if(currentTab==='orders')renderOrders();else if(currentTab==='supply')renderSupply();else if(currentTab==='customers')renderCustomers();else renderSettings();}

function renderToday(){
  const stk=fridgeStock(),fs=slots(stk.boxes10L,stk.units15L),cap=Number(cfg.fridgeCap)||45;
  const pct=Math.min(100,Math.round(fs/cap*100)),fc=pct>=90?'danger':pct>=75?'warn':'';
  const tw=wStart(T()),twP=db.orders.filter(o=>wStart(o.date)===tw&&o.status!=='fulfilled');
  const twF=db.orders.filter(o=>wStart(o.date)===tw&&o.status==='fulfilled').length;
  const c10=twP.reduce((a,o)=>a+(Number(o.boxes10L)||0),0),c15=twP.reduce((a,o)=>a+(Number(o.units15L)||0),0);
  const cs=slots(c10,c15),rs=fs-cs,nt=nextThu(),nd=dUntil(nt);
  const ip=db.orders.filter(o=>(o.city==='Sydney'||o.city==='Melbourne')&&o.status!=='fulfilled');
  const wkRev=db.orders.filter(o=>wStart(o.date)===tw&&o.status==='fulfilled').reduce((a,o)=>a+orderRev(o).inc,0);
  const actions=[];
  if((Number(db.inventory.cavaliersBags)||0)<3&&(Number(db.inventory.warnerBags)||0)>0)actions.push({d:'dw',t:'Low stock at Cavaliers',s:'Restock from Warner'});
  if(rs<0)actions.push({d:'dd',t:`Oversold by ${Math.abs(rs)} slot${Math.abs(rs)>1?'s':''}`,s:"Check orders vs fridge"});

      <div class="metric"><div class="mlbl">Warner</div><div class="mval">${Number(db.inventory.warnerBags)||0}<span style="font-size:14px;font-weight:400"> bags</span></div><div class="msub2">${warnerKg().toLocaleString()} kg</div></div>
      <div class="metric ${nd<=1?'warn':''}"><div class="mlbl">Cool Cartons</div><div class="mval">${nd}<span style="font-size:14px;font-weight:400">d</span></div><div class="msub2">${fmtD(nt)}</div></div>
      <div class="metric"><div class="mlbl">Week revenue</div><div class="mval" style="font-size:16px">${fmtA(wkRev)}</div><div class="msub2">incl. GST · ${twF} done</div></div>
    </div>

    <div class="card"><div class="lbl">Upcoming deliveries</div>${up.length?up.map(o=>{const idx=db.orders.indexOf(o),d=dUntil(o.date),r=orderRev(o);const b=d===0?'<span class="badge bwarn">Today</span>':d===1?'<span class="badge binfo">Tomorrow</span>':`<span class="badge bneutral">In ${d}d</span>`;return`<div class="orow"><div class="oinfo"><div class="oname">${o.customerName}</div><div class="ometa">${o.city} · ${fmtD(o.date)} ${b}</div><div class="oqty">${o.boxes10L||0}×10L · ${o.units15L||0}×1.5L · ${fmtA(r.inc)}</div></div><button class="btn bsm bsuccess" onclick="qFulfil(${idx})">Done</button></div>`;}).join(''):'<div class="empty">No deliveries in the next 7 days</div>'}</div>`;
}

function qFulfil(i){
  const o=db.orders[i];if(!o)return;const prev={...o};const r=orderRev(o);
  o.status='fulfilled';o.fulfilledDate=T();o.revenueExGst=r.ex;o.gst=r.gst;o.revenueIncGst=r.inc;
  const mv={id:uid(),date:T(),type:o.city==='Sydney'||o.city==='Melbourne'?'out-inter':'out-bris',boxes10L:Number(o.boxes10L)||0,units15L:Number(o.units15L)||0,slots:slots(Number(o.boxes10L)||0,Number(o.units15L)||0),notes:`Order: ${o.customerName}`,source:'auto',createdAt:new Date().toISOString()};
  db.fridgeMoves.push(mv);
  if(o.recurring){const nd=new Date(o.date);nd.setDate(nd.getDate()+7);db.orders.push({...o,id:uid(),date:nd.toISOString().slice(0,10),status:'pending',fulfilledDate:'',weekStart:wStart(nd.toISOString().slice(0,10))});}
  saveRow('orders','saveOrder',o);saveRow('fridgeMoves','saveFridgeMove',mv);

  render();
}

}

function rEst(){const rKg=parseFloat(document.getElementById('r-kg').value)||0,e=document.getElementById('r-est'),w=document.getElementById('r-warn');if(!rKg){e.style.display='none';w.style.display='none';return;}const gKg=gfr(rKg),est=bEst(rKg),cTot=cavKg();e.style.display='block';e.innerHTML=`<span style="color:var(--dim)">Green needed: </span><strong>${gKg} kg</strong> → <strong>${rKg} kg</strong> roasted → <strong>${est.L} L</strong><br><strong>${est.b10}×10L + ${est.u15}×1.5L</strong> <span style="color:var(--muted)">(${est.waste} L waste)</span>`;if(gKg>cTot){w.style.display='block';w.textContent=`Cavaliers only has ${cTot} kg — need ${gKg} kg.`;}else w.style.display='none';}
function addRoast(){const d=document.getElementById('r-date').value,p=document.getElementById('r-pickup').value,rKg=parseFloat(document.getElementById('r-kg').value)||0;if(!d||!rKg)return;const gKg=gfr(rKg),est=bEst(rKg);const row={id:uid(),date:d,pickupDate:p,greenKg:gKg,roastedKg:rKg,estBoxes10L:est.b10,estUnits15L:est.u15,actualBoxes10L:0,actualUnits15L:0,yieldVariance:0,status:'scheduled',notes:document.getElementById('r-notes').value.trim(),createdAt:new Date().toISOString()};document.getElementById('r-kg').value='';document.getElementById('r-est').style.display='none';document.getElementById('r-warn').style.display='none';saveRow('roasts','saveRoast',row);renderSupply();showToast('Roast scheduled');}
function doneRoast(id){const r=db.roasts.find(x=>x.id===id);if(!r)return;r.status='done';const kpb=cfg.cavKgPerBag||20,bags=r.greenKg/kpb;db.inventory.cavaliersBags=Math.max(0,(Number(db.inventory.cavaliersBags)||0)-bags);const log={id:uid(),date:T(),type:'roast-deduct',bags:+bags.toFixed(3),kg:r.greenKg,location:'cavaliers',notes:`Roast ${fmtD(r.date)}`,createdAt:new Date().toISOString()};db.greenLog.push(log);saveRow('roasts','saveRoast',r);saveRow('greenLog','saveGreenLog',log);syncInv();renderSupply();showToast(`Roast done — ${r.greenKg}kg deducted`);}
function delRoast(id){showModal('Delete roast?','',()=>{delRow('roasts','deleteRoast',id);renderSupply();});}
function bPrefill(){const sel=document.getElementById('b-ref'),pr=db.roasts.filter(r=>r.status!=='done'),idx=parseInt(sel.value),e=document.getElementById('b-est');if(isNaN(idx)||!pr[idx]){e.style.display='none';return;}const r=pr[idx];document.getElementById('b-10L').value=r.estBoxes10L;document.getElementById('b-15L').value=r.estUnits15L;e.style.display='block';e.innerHTML=`<span style="color:var(--dim)">Estimate:</span> <strong>${r.estBoxes10L}×10L + ${r.estUnits15L}×1.5L</strong>`;}
function addBrew(){const d=document.getElementById('b-date').value;if(!d)return;const b10=parseInt(document.getElementById('b-10L').value)||0,b15=parseInt(document.getElementById('b-15L').value)||0;const sel=document.getElementById('b-ref'),pr=db.roasts.filter(r=>r.status!=='done'),ri=sel?parseInt(sel.value):NaN;const row={id:uid(),roastId:!isNaN(ri)&&pr[ri]?pr[ri].id:'',brewDate:d,pickupDate:document.getElementById('b-pickup').value,actual10L:b10,actual15L:b15,slots:slots(b10,b15),status:'brewing',notes:'',createdAt:new Date().toISOString()};document.getElementById('b-10L').value='';document.getElementById('b-15L').value='';saveRow('brews','saveBrew',row);renderSupply();showToast('Brew batch logged');}
function doneBrew(id){const b=db.brews.find(x=>x.id===id);if(!b)return;b.status='done';const mv={id:uid(),date:T(),type:'in',boxes10L:Number(b.actual10L)||0,units15L:Number(b.actual15L)||0,slots:slots(Number(b.actual10L)||0,Number(b.actual15L)||0),notes:`Brew ${fmtD(b.brewDate)}`,source:'auto',createdAt:new Date().toISOString()};db.fridgeMoves.push(mv);saveRow('brews','saveBrew',b);saveRow('fridgeMoves','saveFridgeMove',mv);renderSupply();showToast(`Picked up — ${slots(Number(b.actual10L)||0,Number(b.actual15L)||0)} slots added`);}
function delBrew(id){showModal('Delete brew batch?','',()=>{delRow('brews','deleteBrew',id);renderSupply();});}
function saveGreens(){db.inventory.warnerBags=parseFloat(document.getElementById('g-wb').value)||0;db.inventory.cavaliersBags=parseFloat(document.getElementById('g-cb').value)||0;syncInv();renderSupply();showToast('Inventory saved');}
function addGLog(){const type=document.getElementById('g-type').value,date=document.getElementById('g-date').value,val=parseFloat(document.getElementById('g-val').value)||0,notes=document.getElementById('g-notes').value.trim();if(!date||!val)return;const kpb=cfg.cavKgPerBag||20,wkpb=cfg.warnerKgPerBag||20;let bags=0,kg=0,loc='';if(type==='restock'){bags=val;kg=val*wkpb;loc='both';db.inventory.warnerBags=Math.max(0,(Number(db.inventory.warnerBags)||0)-val);db.inventory.cavaliersBags=(Number(db.inventory.cavaliersBags)||0)+val;}else if(type==='adj-cav'){kg=val;bags=val/kpb;loc='cavaliers';db.inventory.cavaliersBags=Math.max(0,(Number(db.inventory.cavaliersBags)||0)-bags);}else{kg=val;bags=val/wkpb;loc='warner';db.inventory.warnerBags=Math.max(0,(Number(db.inventory.warnerBags)||0)-bags);}const log={id:uid(),date,type,bags:+bags.toFixed(3),kg,location:loc,notes,createdAt:new Date().toISOString()};db.greenLog.push(log);document.getElementById('g-val').value='';saveRow('greenLog','saveGreenLog',log);syncInv();renderSupply();}
function dGLog(id){showModal('Remove log entry?','Inventory will be reversed.',()=>{const l=db.greenLog.find(x=>x.id===id);if(l){if(l.type==='restock'){db.inventory.warnerBags=(Number(db.inventory.warnerBags)||0)+(Number(l.bags)||0);db.inventory.cavaliersBags=Math.max(0,(Number(db.inventory.cavaliersBags)||0)-(Number(l.bags)||0));}else if(l.type==='adj-cav')db.inventory.cavaliersBags=(Number(db.inventory.cavaliersBags)||0)+(Number(l.bags)||0);else if(l.type==='adj-war')db.inventory.warnerBags=(Number(db.inventory.warnerBags)||0)+(Number(l.bags)||0);}delRow('greenLog','deleteGreenLog',id);syncInv();renderSupply();});}

function renderCustomers(did){
  if(did!=null){
    const c=db.customers.find(x=>x.id===did);if(!c)return renderCustomers();
    const ords=db.orders.filter(o=>o.customerName===c.name||o.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date));
    const tRev=ords.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+orderRev(o).inc,0);
    const tB=ords.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+(Number(o.boxes10L)||0),0);
    const tU=ords.filter(o=>o.status==='fulfilled').reduce((a,o)=>a+(Number(o.units15L)||0),0);
    document.getElementById('page').innerHTML=`
      <button class="btn bghost" style="margin-bottom:12px" onclick="renderCustomers()">← Back</button>
      <div class="card">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div class="avatar" style="width:50px;height:50px;font-size:16px">${inits(c.name)}</div><div><div style="font-size:18px;font-weight:800">${c.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${c.city}${c.address?' · '+c.address:''}</div></div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"><span class="badge binfo">${c.default10L||0}×10L default</span><span class="badge binfo">${c.default15L||0}×1.5L default</span><span class="badge bneutral">${fmtA(c.price10L||cfg.price10L||175)} / 10L</span><span class="badge bneutral">${fmtA(c.price15L||cfg.price15L||26.25)} / 1.5L</span></div>
        <div class="brow"><button class="btn bprimary" style="flex:1" onclick="qOrderFor('${c.id}')">New order</button><button class="btn bdanger2" onclick="delCust('${c.id}')">Delete</button></div>
      </div>
      <div class="card-mint"><div class="lbl">All-time summary</div>
        <div class="rrow"><span class="rlbl">Total revenue (incl. GST)</span><span class="rval g">${fmtA(tRev)}</span></div>
        <div class="rrow"><span class="rlbl">Orders fulfilled</span><span class="rval">${ords.filter(o=>o.status==='fulfilled').length}</span></div>
        <div class="rrow"><span class="rlbl">10L boxes ordered</span><span class="rval">${tB}</span></div>
        <div class="rrow"><span class="rlbl">1.5L units ordered</span><span class="rval">${tU}</span></div>
      </div>
      <div class="card"><div class="lbl">Order history</div>${ords.length?ords.slice(0,30).map(o=>{const d=dUntil(o.date),r=orderRev(o);const sb=o.status==='fulfilled'?'<span class="badge bok">Fulfilled</span>':d<0?'<span class="badge bdanger">Overdue</span>':d===0?'<span class="badge bwarn">Today</span>':'<span class="badge binfo">Pending</span>';return`<div class="orow"><div class="oinfo"><div class="oname">${fmtD(o.date)} ${sb}</div><div class="oqty">${o.boxes10L||0}×10L · ${o.units15L||0}×1.5L · ${fmtA(r.inc)}</div></div></div>`;}).join(''):'<div class="empty">No orders yet</div>'}</div>`;
    return;
  }
  document.getElementById('page').innerHTML=`
    <div class="card"><div class="lbl">Add customer</div>
      <div class="fr"><div class="fg"><label class="fl">Name</label><input class="fi" id="c-name" type="text" placeholder="Customer name"></div><div class="fg"><label class="fl">City</label><select class="fi" id="c-city"><option>Brisbane</option><option>Sydney</option><option>Melbourne</option><option>Other</option></select></div></div>
      <div class="fg"><label class="fl">Address</label><input class="fi" id="c-addr" type="text" placeholder="optional"></div>
      <div class="fr"><div class="fg"><label class="fl">Price per 10L (ex GST)</label><input class="fi" id="c-p10" type="number" step="0.01" value="${cfg.price10L||175}"></div><div class="fg"><label class="fl">Price per 1.5L (ex GST)</label><input class="fi" id="c-p15" type="number" step="0.01" value="${cfg.price15L||26.25}"></div></div>
      <div class="fr"><div class="fg"><label class="fl">Default 10L</label><input class="fi" id="c-10L" type="number" min="0" placeholder="0"></div><div class="fg"><label class="fl">Default 1.5L</label><input class="fi" id="c-15L" type="number" min="0" placeholder="0"></div></div>
      <button class="btn bprimary bfull" onclick="addCust()">Add customer</button>
    </div>
    <div class="card"><div class="lbl">Directory (${db.customers.length})</div>${db.customers.length?db.customers.map(c=>{const n=db.orders.filter(o=>o.customerName===c.name&&o.status==='fulfilled').length;return`<div class="crow" onclick="renderCustomers('${c.id}')"><div class="avatar">${inits(c.name)}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">${c.name}</div><div style="font-size:12px;color:var(--muted);margin-top:1px">${c.city}${c.address?' · '+c.address:''}</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px"><span class="badge bneutral">${c.default10L||0}×10L</span><span class="badge bneutral">${c.default15L||0}×1.5L</span><span class="badge bneutral">${n} orders</span></div></div><span style="font-size:20px;color:rgba(25,51,48,0.25)">›</span></div>`;}).join(''):'<div class="empty">No customers yet</div>'}</div>`;
}
function addCust(){const name=document.getElementById('c-name').value.trim();if(!name)return;const row={id:uid(),name,city:document.getElementById('c-city').value,address:document.getElementById('c-addr').value.trim(),price10L:parseFloat(document.getElementById('c-p10').value)||cfg.price10L||175,price15L:parseFloat(document.getElementById('c-p15').value)||cfg.price15L||26.25,default10L:parseInt(document.getElementById('c-10L').value)||0,default15L:parseInt(document.getElementById('c-15L').value)||0,notes:'',createdAt:new Date().toISOString()};['c-name','c-addr','c-10L','c-15L'].forEach(id=>{document.getElementById(id).value='';});saveRow('customers','saveCustomer',row);renderCustomers();showToast(`${name} added`);}
function qOrderFor(cid){const c=db.customers.find(x=>x.id===cid);if(!c)return;nav('orders');setTimeout(()=>{const pre=document.getElementById('o-pre');if(pre){pre.value=cid;prefillO();}else{const n=document.getElementById('o-name');if(n){n.value=c.name;document.getElementById('o-city').value=c.city;document.getElementById('o-addr').value=c.address||'';document.getElementById('o-10L').value=c.default10L||0;document.getElementById('o-15L').value=c.default15L||0;oHint();}}},50);}
function delCust(id){showModal('Delete customer?','Order history will remain.',()=>{delRow('customers','deleteCustomer',id);renderCustomers();});}

function renderSettings(){
  const url=getApiUrl();const sc=url?'<span class="badge bok">Connected</span>':'<span class="badge bdanger">Not connected</span>';
  document.getElementById('page').innerHTML=`
    <div class="card"><div class="lbl">Database</div>
      <div class="srow"><div><div class="slbl">Google Sheets sync</div><div class="ssub2">${url?'Syncing to your Sheet':'Not connected'}</div></div>${sc}</div>
      ${!url?`<div class="fg" style="margin-top:12px"><label class="fl">Web App URL</label><input class="fi" id="s-url" type="url" placeholder="https://script.google.com/macros/s/..."><button class="btn bprimary bfull" onclick="saveUrl()" style="margin-top:8px">Connect</button></div><div class="divider"></div><div class="lbl">Setup guide</div><div class="setup-step"><div class="snum">1</div><div class="sbody">Create a new <strong>Google Sheet</strong>. Copy the Sheet ID from its URL.</div></div><div class="setup-step"><div class="snum">2</div><div class="sbody">Open <strong>Extensions → Apps Script</strong>. Paste the contents of <code>Code.gs</code>. Add your Sheet ID to the <code>SHEET_ID</code> variable at the top.</div></div><div class="setup-step"><div class="snum">3</div><div class="sbody">In Apps Script, run <strong>initSheets()</strong> once from the editor to create all tabs.</div></div><div class="setup-step"><div class="snum">4</div><div class="sbody">Click <strong>Deploy → New deployment → Web app</strong>. Set execute as <strong>Me</strong> and access to <strong>Anyone</strong>. Copy the URL.</div></div><div class="setup-step"><div class="snum">5</div><div class="sbody">Paste the URL above and tap Connect. Share the same URL with your team — they paste it on their own devices.</div></div>`:url?`<button class="btn bghost" style="width:100%;margin-top:10px" onclick="loadAll();showToast('Syncing...')">Force sync now</button><button class="btn bdanger2" style="width:100%;margin-top:8px" onclick="if(confirm('Disconnect Google Sheets?')){localStorage.removeItem('arops_api_url');location.reload();}">Disconnect</button>`:''}
    </div>
    <div class="card"><div class="lbl">Ratios & pricing</div>
      <div class="srow"><div><div class="slbl">Fridge capacity</div><div class="ssub2">Slots (1 = 1×10L or 4×1.5L)</div></div><input class="sinput" type="number" id="s-cap" value="${cfg.fridgeCap||45}"></div>
      <div class="srow"><div><div class="slbl">Roast ratio</div><div class="ssub2">kg green → kg roasted</div></div><input class="sinput" type="number" step="0.01" id="s-roast" value="${cfg.roastRatio||0.8}"></div>
      <div class="srow"><div><div class="slbl">Brew ratio</div><div class="ssub2">L cold brew per kg roasted</div></div><input class="sinput" type="number" step="0.01" id="s-brew" value="${cfg.brewRatio||4.3}"></div>
      <div class="srow"><div><div class="slbl">Warner kg per bag</div></div><input class="sinput" type="number" id="s-wkpb" value="${cfg.warnerKgPerBag||20}"></div>
      <div class="srow"><div><div class="slbl">Cavaliers kg per bag</div></div><input class="sinput" type="number" id="s-ckpb" value="${cfg.cavKgPerBag||20}"></div>
      <div class="srow"><div><div class="slbl">Default price 10L (ex GST)</div></div><input class="sinput" type="number" step="0.01" id="s-p10" value="${cfg.price10L||175}"></div>
      <div class="srow"><div><div class="slbl">Default price 1.5L (ex GST)</div></div><input class="sinput" type="number" step="0.01" id="s-p15" value="${cfg.price15L||26.25}"></div>
      <div class="srow"><div><div class="slbl">GST rate</div><div class="ssub2">0.1 = 10%</div></div><input class="sinput" type="number" step="0.01" id="s-gst" value="${cfg.gstRate||0.1}"></div>
      <button class="btn bprimary bfull" style="margin-top:14px" onclick="saveCfg()">Save settings</button>
    </div>`;
}
function saveUrl(){const url=document.getElementById('s-url').value.trim();if(!url||!url.includes('script.google.com')){showToastErr('Invalid URL');return;}localStorage.setItem('arops_api_url',url);location.reload();}
function saveCfg(){cfg.fridgeCap=parseInt(document.getElementById('s-cap').value)||45;cfg.roastRatio=parseFloat(document.getElementById('s-roast').value)||0.8;cfg.brewRatio=parseFloat(document.getElementById('s-brew').value)||4.3;cfg.warnerKgPerBag=parseFloat(document.getElementById('s-wkpb').value)||20;cfg.cavKgPerBag=parseFloat(document.getElementById('s-ckpb').value)||20;cfg.price10L=parseFloat(document.getElementById('s-p10').value)||175;cfg.price15L=parseFloat(document.getElementById('s-p15').value)||26.25;cfg.gstRate=parseFloat(document.getElementById('s-gst').value)||0.1;syncCfg();showToast('Settings saved');}

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
loadAll();
</script>
</body>
</html>
